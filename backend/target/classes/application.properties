# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/whackamole_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logging Configuration
logging.level.org.springframework.web=DEBUG
logging.level.com.whackamole=DEBUG

# Static Resource Configuration - MANDATORY to prevent directory listing
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# View Configuration - MANDATORY for @Controller to work
spring.mvc.view.suffix=.html
