# ============================================================================
# Render Blueprint for Whack-a-Mole Application
# ============================================================================
# This file allows one-click deployment to Render
# Usage: Connect your repo and Render will auto-detect this file

services:
  # Web Service - Spring Boot Backend
  - type: web
    name: whackamole-backend
    env: docker
    region: oregon
    plan: free
    branch: main
    
    # Docker build configuration
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    # Health check endpoint
    healthCheckPath: /api/health
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: DB_URL
        sync: false
        # Example: jdbc:mysql://aws.connect.psdb.cloud/whackamole_db?sslMode=VERIFY_IDENTITY
      
      - key: DB_USER
        sync: false
        # Your database username
      
      - key: DB_PASSWORD
        sync: false
        # Your database password
      
      - key: CORS_ALLOWED_ORIGINS
        value: https://whackamole-backend.onrender.com
        # Update with your actual Render URL after first deployment
      
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
        # JVM memory settings for free tier
    
    # Auto-deploy on git push
    autoDeploy: true

# ============================================================================
# Database Configuration (External)
# ============================================================================
# Render doesn't provide managed MySQL, use external provider:
# - PlanetScale (recommended): https://planetscale.com
# - Railway: https://railway.app
# - AWS RDS: https://aws.amazon.com/rds/
